name: Build, Test and Deploy FastAPI Application

env:
  PYTHON_VERSION: '3.13'
  DOCKER_IMAGE: koval01/telegram-me

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            venv/
          key: ${{ runner.os }}-python-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          pip install pylint radon

      - name: Analysing the code with pylint
        run: |
          pylint $(git ls-files '*.py')

      - name: Run Radon analysis
        if: matrix.python-version == '3.13'
        run: |
          echo "## Cyclomatic Complexity (CC)"
          radon cc $(git ls-files '*.py') -nc
          echo ""
          echo "## Maintainability Index (MI)"
          radon mi $(git ls-files '*.py') -s
          echo ""
          echo "## Halstead Metrics"
          radon hal $(git ls-files '*.py')

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    strategy:
      matrix:
        preset: [full, minimal]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env.local for testing
        run: |
          echo "REDIS_URL=${{ secrets.REDIS_URL }}" > .env.local
          if [ "${{ matrix.preset }}" = "minimal" ]; then
            echo "ENABLE_FEED=0" >> .env.local
            echo "ENABLE_PREVIEWS=0" >> .env.local
            echo "ENABLE_RATE_LIMIT=1" >> .env.local
            echo "RATE_LIMIT_RPM=90" >> .env.local
            echo "CACHE_MODE=aggressive" >> .env.local
            echo "PARSER_MODE=simplified" >> .env.local
          else
            echo "ENABLE_FEED=1" >> .env.local
            echo "ENABLE_PREVIEWS=1" >> .env.local
            echo "ENABLE_RATE_LIMIT=0" >> .env.local
            echo "RATE_LIMIT_RPM=120" >> .env.local
            echo "CACHE_MODE=normal" >> .env.local
            echo "PARSER_MODE=full" >> .env.local
          fi
          echo "Created .env.local file with REDIS_URL"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            venv/
          key: ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          pip install uvicorn httpx pytest

      - name: Set env
        run: |
          export 'REDIS_URL=${{ secrets.REDIS_URL }}'

      - name: Run unit and integration tests
        run: |
          pytest -q

      - name: Run FastAPI app in background
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          echo "Waiting for server to start..."
          sleep 10

      - name: Validate OpenAPI contract
        run: |
          curl -s -f http://127.0.0.1:8000/healthz > /dev/null
          curl -s -f http://127.0.0.1:8000/openapi.json > openapi.json
          python - <<'PY'
          import json
          with open("openapi.json", "r", encoding="utf-8") as f:
              spec = json.load(f)

          assert "/v1/feed" in spec["paths"], "Missing /v1/feed in OpenAPI"
          assert "/v1/preview/{channel}" in spec["paths"], "Missing /v1/preview/{channel}"
          assert "/v1/previews" in spec["paths"], "Missing /v1/previews"

          preview_responses = spec["paths"]["/v1/preview/{channel}"]["get"]["responses"]
          feed_responses = spec["paths"]["/v1/feed"]["post"]["responses"]
          assert "503" in preview_responses, "Preview endpoint must document 503 when feature disabled"
          assert "503" in feed_responses, "Feed endpoint must document 503 when feature disabled"
          PY

      - name: Smoke check feature preset behavior
        run: |
          if [ "${{ matrix.preset }}" = "minimal" ]; then
            preview_code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8000/v1/preview/durov")
            feed_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:8000/v1/feed" -H "Content-Type: application/json" -d '{"channels":["durov"]}')
            previews_code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:8000/v1/previews" -H "Content-Type: application/json" -d '{"channels":["durov"]}')
            test "$preview_code" = "503"
            test "$feed_code" = "503"
            test "$previews_code" = "503"
          else
            docs_code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8000/")
            test "$docs_code" = "200"
          fi

      - name: Run extended smoke matrix
        run: |
          python3 scripts/smoke_matrix.py --base-url http://127.0.0.1:8000 --preset ${{ matrix.preset }}

      - name: Show server logs (if failed)
        if: failure()
        run: |
          echo "=== Server Logs ==="
          cat server.log

  docker-build-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        preset: [full, minimal]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env.local for Docker build
        run: |
          echo "REDIS_URL=${{ secrets.REDIS_URL }}" > .env.local
          if [ "${{ matrix.preset }}" = "minimal" ]; then
            echo "ENABLE_FEED=0" >> .env.local
            echo "ENABLE_PREVIEWS=0" >> .env.local
            echo "ENABLE_RATE_LIMIT=1" >> .env.local
            echo "RATE_LIMIT_RPM=90" >> .env.local
            echo "CACHE_MODE=aggressive" >> .env.local
            echo "PARSER_MODE=simplified" >> .env.local
          else
            echo "ENABLE_FEED=1" >> .env.local
            echo "ENABLE_PREVIEWS=1" >> .env.local
            echo "ENABLE_RATE_LIMIT=0" >> .env.local
            echo "RATE_LIMIT_RPM=120" >> .env.local
            echo "CACHE_MODE=normal" >> .env.local
            echo "PARSER_MODE=full" >> .env.local
          fi
          echo "Created .env.local file with REDIS_URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA and current date
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Build Docker image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:test-${{ steps.vars.outputs.short_sha }}-${{ matrix.preset }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REDIS_URL=${{ secrets.REDIS_URL }}

      - name: Test Docker image
        run: |
          echo "Starting Docker container for testing..."
          docker run -d -p 8000:3000 --env-file .env.local --name fastapi-test-${{ matrix.preset }} ${{ env.DOCKER_IMAGE }}:test-${{ steps.vars.outputs.short_sha }}-${{ matrix.preset }}
          
          echo "Waiting for container to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:8000/healthz > /dev/null; then
              echo "✓ Container is ready!"
              break
            fi
            echo "Waiting for container to be ready... ($i/30)"
            sleep 2
          done

          # Test health endpoint
          echo "Testing health endpoint..."
          curl -f http://localhost:8000/healthz || (echo "✗ Health check failed" && exit 1)

          # Test basic functionality
          echo "Testing basic endpoints..."
          curl -s -f http://localhost:8000/openapi.json > /dev/null || (echo "✗ OpenAPI endpoint failed" && exit 1)
          if [ "${{ matrix.preset }}" = "minimal" ]; then
            preview_code=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/v1/preview/durov")
            test "$preview_code" = "503" || (echo "✗ Minimal preset must return 503 for /v1/preview" && exit 1)
          else
            curl -s http://localhost:8000/ | grep -q "Swagger" && echo "✓ Root endpoint working" || (echo "✗ Root endpoint failed" && exit 1)
          fi

          echo "✓ All Docker tests passed"

      - name: Run extended smoke matrix against Docker
        run: |
          python3 scripts/smoke_matrix.py --base-url http://localhost:8000 --preset ${{ matrix.preset }}

          # Cleanup
          docker stop fastapi-test-${{ matrix.preset }}
          docker rm fastapi-test-${{ matrix.preset }}

  build-push:
    name: Build and Push Multi-arch Docker Image
    runs-on: ubuntu-latest
    needs: [docker-build-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Create .env.local for production build
        run: |
          echo "REDIS_URL=${{ secrets.REDIS_URL }}" > .env.local
          echo "Created .env.local file with REDIS_URL"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKER_IMAGE }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REDIS_URL=${{ secrets.REDIS_URL }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-push ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Get version info
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT

      - name: Create Automated Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Auto: ${{ steps.vars.outputs.build_date }}-${{ steps.vars.outputs.short_sha }}"
          tag_name: "auto-${{ steps.vars.outputs.build_date }}-${{ steps.vars.outputs.short_sha }}"
          generate_release_notes: true
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Servers
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Create .env.local for deployment
        run: |
          echo "REDIS_URL=${{ secrets.REDIS_URL }}" > .env.local
          echo "Created .env.local file with REDIS_URL"

      - name: Deploy to servers
        run: |
          # Save SSH private key to file
          echo "${{ secrets.SSH_KEY }}" > private_key
          chmod 600 private_key
          
          # Split servers IPs into array
          SERVERS=(${{ secrets.SERVERS_IPS }})
          
          # Copy .env.local to servers and deploy
          DEPLOY_COMMAND="docker pull ${{ env.DOCKER_IMAGE }}:latest && \
                         docker stop telegram-me || true && \
                         docker rm telegram-me || true && \
                         docker run -d --name telegram-me -p 8000:3000 --env-file env.app ${{ env.DOCKER_IMAGE }}:latest"
          
          HEALTH_CHECK="sleep 30 && curl -f http://localhost:8000/healthz && echo '✓ Health check passed'"
          
          # Loop through each server and execute command
          for SERVER_IP in "${SERVERS[@]}"; do
            echo "Deploying to server: $SERVER_IP"
            
            # Copy .env.local to server
            scp -o StrictHostKeyChecking=no -i private_key .env.local ubuntu@$SERVER_IP:~/env.app || echo "⚠️ Failed to copy .env.local to $SERVER_IP"
            
            # Deploy
            ssh -o StrictHostKeyChecking=no -i private_key ubuntu@$SERVER_IP "$DEPLOY_COMMAND" || echo "⚠️ Deployment failed on $SERVER_IP"
            
            echo "Health checking server: $SERVER_IP"
            ssh -o StrictHostKeyChecking=no -i private_key ubuntu@$SERVER_IP "$HEALTH_CHECK" || echo "⚠️ Health check failed on $SERVER_IP"
            
            echo "Checking running containers on $SERVER_IP"
            ssh -o StrictHostKeyChecking=no -i private_key ubuntu@$SERVER_IP "docker ps" || echo "⚠️ Failed to check containers on $SERVER_IP"
          done
          
          # Test external health check
          echo "Testing external health check..."
          curl -s -f 'https://telegram-me.ignorelist.com/healthz' && echo "✓ External health check passed" || echo "⚠️ External health check failed"
          
          # Cleanup
          rm -f private_key .env.local
